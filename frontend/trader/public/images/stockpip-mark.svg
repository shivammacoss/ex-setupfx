<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <defs>
    <linearGradient id="sp-mk-bg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD24A"/>
      <stop offset="0.55" stop-color="#F5B800"/>
      <stop offset="1" stop-color="#C68A00"/>
    </linearGradient>
    <linearGradient id="sp-mk-line" x1="0" y1="56" x2="56" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1209"/>
      <stop offset="1" stop-color="#3a280f"/>
    </linearGradient>
  </defs>
  <!-- rounded square tile with subtle inner highlight -->
  <rect width="56" height="56" rx="14" fill="url(#sp-mk-bg)"/>
  <rect x="0.5" y="0.5" width="55" height="55" rx="13.5" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Stylized "S" — top swoop and bottom swoop, mimics a pip/candle profile -->
  <path d="M19 16 Q14 16 14 21 Q14 26 22 27 Q30 28 30 33 Q30 38 24 38 Q18 38 16 34"
        stroke="url(#sp-mk-line)" stroke-width="3.2" stroke-linecap="round" fill="none"/>

  <!-- Stylized "P" — stem + bowl -->
  <path d="M34 16 L34 40" stroke="url(#sp-mk-line)" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M34 16 Q43 16 43 22 Q43 28 34 28" stroke="url(#sp-mk-line)" stroke-width="3.2" stroke-linecap="round" fill="none"/>

  <!-- Up-trending chart line in the corner (the "pip") -->
  <path d="M40 44 L44 40 L48 42" stroke="#1a1209" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="48" cy="42" r="1.6" fill="#1a1209"/>
</svg>
